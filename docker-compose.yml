version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: faq_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: faq_chatbot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + Neuro-SAN) ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faq_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: faq_chatbot
      AGENT_MANIFEST_FILE: /app/registries/manifest.hocon
      # Set your LLM API key here (or via .env file)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/registries:/app/registries:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000/api
    container_name: faq_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data: